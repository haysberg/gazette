[general]
root = "/app/static"
port = 8000
page404 = "./404.html"
cache-control-headers = true
host = "0.0.0.0"
compression = true
compression-static = true

# Security headers applied to every response
[[advanced.headers]]
source = "**/*"
headers.Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
headers.X-Content-Type-Options = "nosniff"
headers.Referrer-Policy = "same-origin"
headers.X-Frame-Options = "DENY"
headers.Permissions-Policy = "interest-cohort=(), browsing-topics=()"

# Advertise feed alternates on every HTML response
[[advanced.headers]]
source = "**/*.html"
headers.Link = "</feed.xml>; rel=\"alternate\"; type=\"application/rss+xml\"; title=\"Gazette Insoumise — RSS\", </feeds.opml>; rel=\"alternate\"; type=\"text/x-opml\"; title=\"Gazette Insoumise — OPML\""

# Cache static assets for 1 week, HTML/XML for 15 minutes
[[advanced.headers]]
source = "**/*.{css,woff2,avif,png,ico,json}"
headers.Cache-Control = "public, max-age=604800, immutable"

[[advanced.headers]]
source = "**/*.{html,xml}"
headers.Cache-Control = "public, max-age=900"

# JS has a long cache, except sw.js which needs a short TTL for update propagation
[[advanced.headers]]
source = "**/js/*.js"
headers.Cache-Control = "public, max-age=604800, immutable"

[[advanced.headers]]
source = "sw.js"
headers.Cache-Control = "public, max-age=900"
